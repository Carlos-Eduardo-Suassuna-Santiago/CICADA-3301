serial --unit=0 --speed=115200
terminal_input console serial
terminal_output console serial

# Force text mode so the kernel VGA console at 0xB8000 works reliably
# on VirtualBox and physical BIOS machines.
set gfxpayload=text

set default=0

set timeout=5

menuentry "CICADA-OS Kernel" {
    multiboot /boot/kernel.bin
    boot
}
